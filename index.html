<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football TV Pro</title>

<style>
:root{
--bg:#0f172a;
--card:#1e293b;
--text:white;
--main:#2563eb;
}

body.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
}

body{
margin:0;
font-family:sans-serif;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

/* HEADER */
.header{
text-align:center;
padding:15px;
}

.header h1{
margin:5px;
}

/* BUTTON */
button{
background:var(--main);
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
}

/* SEARCH */
input{
width:90%;
padding:12px;
margin:10px;
border-radius:10px;
border:none;
}

/* CARD */
.card{
background:var(--card);
margin:10px;
padding:15px;
border-radius:15px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

/* STAR */
.star{
float:left;
cursor:pointer;
color:gold;
}

/* TOP BUTTON */
.top{
position:fixed;
top:10px;
right:10px;
}

.hidden{display:none;}

</style>
</head>

<body>

<div class="top">
<button onclick="toggleMode()">🌗</button>
</div>

<div class="header">
<h1>⚽ Football TV Pro</h1>
<p>تابع أفضل الأندية العالمية بسهولة</p>
</div>

<input type="text" placeholder="🔎 ابحث عن نادي..." onkeyup="searchClub(this.value)">

<div id="home"></div>

<script>

/* 🌗 الوضع */
function toggleMode(){
document.body.classList.toggle("light");
}

/* ⭐ مفضلة */
let fav = JSON.parse(localStorage.getItem("fav")||"[]");

/* 🌍 البيانات */
const data={
"🇩🇿 الجزائر":["MC Alger","JS Kabylie","CRB","ES Setif"],
"🇪🇸 إسبانيا":["Barcelona","Real Madrid","Atletico Madrid"],
"🇬🇧 إنجلترا":["Liverpool","Chelsea","Arsenal","Man City","Man United"],
"🇫🇷 فرنسا":["PSG","Marseille"],
"🇮🇹 إيطاليا":["Juventus","Inter","AC Milan"],
"🇩🇪 ألمانيا":["Bayern","Dortmund"],
"🇵🇹 البرتغال":["Benfica","Porto"],
"🇳🇱 هولندا":["Ajax"],
"🇧🇷 البرازيل":["Flamengo"],
"🇦🇷 الأرجنتين":["Boca Juniors"],
"🇸🇦 السعودية":["Al Hilal","Al Nassr"]
};

const home=document.getElementById("home");

/* عرض */
for(let country in data){

let cTitle=document.createElement("div");
cTitle.className="card";
cTitle.innerHTML="🌍 "+country;
home.appendChild(cTitle);

data[country].forEach(club=>{
let div=document.createElement("div");
div.className="card";

let star = fav.includes(club) ? "⭐" : "☆";

div.innerHTML=`${club} <span class="star">${star}</span>`;

div.onclick=()=>{
toggleFav(club);
};

home.appendChild(div);
});

}

/* ⭐ */
function toggleFav(club){
if(fav.includes(club)){
fav=fav.filter(c=>c!==club);
}else{
fav.push(club);
}
localStorage.setItem("fav",JSON.stringify(fav));
location.reload();
}

/* 🔎 */
function searchClub(val){
val=val.toLowerCase();

document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
});
}

</script>

</body>
</html>
