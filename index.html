<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football TV Pro</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --btn:#2563eb;
}

body.light{
    --bg1:#e5e7eb;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --btn:#3b82f6;
}

body{
margin:0;
font-family:-apple-system,"Segoe UI";
background: radial-gradient(circle at top,var(--bg1),var(--bg2));
color:var(--text);
}

h1{
text-align:center;
margin-top:20px;
}

.container{padding:15px;}

.card{
background:var(--card);
border-radius:20px;
padding:15px;
margin:10px;
display:flex;
justify-content:space-between;
cursor:pointer;
}

.star{color:gold;cursor:pointer;}

button{
background:var(--btn);
border:none;
padding:10px;
border-radius:10px;
color:white;
margin:5px;
cursor:pointer;
}

.hidden{display:none;}

.top{
position:fixed;
top:10px;
right:10px;
}
</style>
</head>

<body>

<div class="top">
<button onclick="toggleMode()">🌗</button>
<button onclick="toggleLang()">🌐</button>
<button onclick="openFav()">⭐</button>
</div>

<h1 id="title">⚽ Football TV Pro</h1>

<div class="container">

<div id="home">
<input id="search" type="text" placeholder="🔎 ابحث..." onkeyup="searchClub(this.value)">
<div class="card" onclick="openCountry('dz')">🇩🇿 الجزائر</div>
<div class="card" onclick="openCountry('es')">🇪🇸 إسبانيا</div>
<div class="card" onclick="openCountry('en')">🇬🇧 إنجلترا</div>
</div>

<div id="country" class="hidden">
<button onclick="backHome()">⬅</button>
<h2 id="countryTitle"></h2>
<div id="clubsList"></div>
</div>

<div id="clubPage" class="hidden">
<button onclick="backCountry()">⬅</button>
<h2 id="clubName"></h2>
<div class="card">
<a id="ytLink" target="_blank">📺</a>
</div>
</div>

<div id="favoritesPage" class="hidden">
<button onclick="backHome()">⬅</button>
<h2 id="favTitle">⭐ المفضلة</h2>
<div id="favList"></div>
</div>

</div>

<script>

let lang = localStorage.getItem("lang") || "ar";
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let currentCountry="";

const data={
dz:{name:{ar:"🇩🇿 الجزائر",en:"Algeria"},clubs:{
"MC Alger":"https://www.youtube.com/@MouloudiaClubAlger",
"JS Kabylie":"https://www.youtube.com/@JSKabylieOfficiel"
}},
es:{name:{ar:"🇪🇸 إسبانيا",en:"Spain"},clubs:{
"Barcelona":"https://www.youtube.com/@FCBarcelona",
"Real Madrid":"https://www.youtube.com/@realmadrid"
}},
en:{name:{ar:"🇬🇧 إنجلترا",en:"England"},clubs:{
"Liverpool":"https://www.youtube.com/@liverpoolfc",
"Chelsea":"https://www.youtube.com/@chelseafc"
}}
};

/* 🌗 */
function toggleMode(){
document.body.classList.toggle("light");
}

/* 🌐 */
function toggleLang(){
lang = lang==="ar" ? "en":"ar";
localStorage.setItem("lang",lang);
location.reload();
}

/* NAV */
function openCountry(c){
currentCountry=c;
home.style.display="none";
country.style.display="block";
countryTitle.innerText=data[c].name[lang];

clubsList.innerHTML="";
for(let club in data[c].clubs){
let div=document.createElement("div");
div.className="card";

let star = favorites.includes(club) ? "⭐":"☆";

div.innerHTML=`${club} <span class="star">${star}</span>`;

div.onclick=()=>openClub(club);

div.querySelector(".star").onclick=(e)=>{
e.stopPropagation();
toggleFav(club);
};

clubsList.appendChild(div);
}
}

function openClub(name){
clubPage.style.display="block";
country.style.display="none";
clubName.innerText=name;
ytLink.href=data[currentCountry].clubs[name];
}

function backHome(){
home.style.display="block";
country.style.display="none";
clubPage.style.display="none";
favoritesPage.style.display="none";
}

function backCountry(){
clubPage.style.display="none";
country.style.display="block";
}

/* ⭐ */
function toggleFav(club){
if(favorites.includes(club)){
favorites=favorites.filter(c=>c!==club);
}else{
favorites.push(club);
}
localStorage.setItem("fav",JSON.stringify(favorites));
openCountry(currentCountry);
}

/* ⭐ صفحة المفضلة */
function openFav(){
home.style.display="none";
favoritesPage.style.display="block";

favList.innerHTML="";
favorites.forEach(club=>{
let div=document.createElement("div");
div.className="card";
div.innerText=club;
favList.appendChild(div);
});
}

/* 🔎 */
function searchClub(val){
val=val.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "flex":"none";
});
}

</script>

</body>
</html>
