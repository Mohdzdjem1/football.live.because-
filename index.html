<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football TV Pro</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

/* 🔥 HEADER */
.header{
text-align:center;
padding:15px;
}

button{
background:#2563eb;
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
margin:5px;
}

/* 📦 CARD */
.card{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:15px;
cursor:pointer;
}

/* ⭐ */
.favorite{
color:gold;
float:left;
cursor:pointer;
}

.section{
padding:10px;
}

/* 🔔 notification */
.notify{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:12px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="header">
<h2>⚽ Football TV Pro</h2>
<button onclick="enableNotify()">🔔 تفعيل الإشعارات</button>
</div>

<div class="section">
<h3>⏰ مباريات اليوم</h3>
<div id="matches"></div>
</div>

<div class="section">
<h3>🌍 الأندية</h3>
<div id="clubs"></div>
</div>

<div class="notify" id="notifyBox">🔔 مباراة بدأت الآن!</div>

<script>

/* 🔥 مباريات وهمية (تقدر تبدلها) */
const matches=[
{team1:"Barcelona",team2:"Real Madrid",time:"21:00"},
{team1:"Liverpool",team2:"Chelsea",time:"20:30"},
{team1:"PSG",team2:"Marseille",time:"22:00"}
];

const matchesDiv=document.getElementById("matches");

matches.forEach(m=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`⚽ ${m.team1} vs ${m.team2} - ⏰ ${m.time}`;
matchesDiv.appendChild(div);
});

/* ⭐ مفضلة */
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");

/* 🌍 أندية */
const clubsList=[
"Barcelona","Real Madrid","Liverpool","Chelsea","Arsenal",
"PSG","Juventus","Bayern","Ajax","Al Nassr","Al Hilal"
];

const clubsDiv=document.getElementById("clubs");

clubsList.forEach(club=>{
let div=document.createElement("div");
div.className="card";

let star = favorites.includes(club) ? "⭐" : "☆";

div.innerHTML=`${club} <span class="favorite">${star}</span>`;

div.onclick=()=>{
toggleFav(club);
};

clubsDiv.appendChild(div);
});

/* ⭐ toggle */
function toggleFav(club){
if(favorites.includes(club)){
favorites=favorites.filter(c=>c!==club);
}else{
favorites.push(club);
}
localStorage.setItem("fav",JSON.stringify(favorites));
location.reload();
}

/* 🔔 إشعار */
function enableNotify(){
alert("تم تفعيل الإشعارات ✅");

/* تجربة إشعار بعد 5 ثواني */
setTimeout(()=>{
let box=document.getElementById("notifyBox");
box.style.display="block";

setTimeout(()=>{
box.style.display="none";
},4000);

},5000);
}

</script>

</body>
</html>
