<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football TV Pro</title>

<style>
:root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --card:rgba(255,255,255,0.08);
    --text:white;
    --btn:#2563eb;
}

body.light{
    --bg1:#e5e7eb;
    --bg2:#f8fafc;
    --card:rgba(0,0,0,0.06);
    --text:#0f172a;
    --btn:#3b82f6;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
background: radial-gradient(circle at top,var(--bg1),var(--bg2));
color:var(--text);
overflow-x:hidden;
transition:0.3s;
}

h1{
text-align:center;
margin-top:20px;
font-size:30px;
letter-spacing:1px;
}

input{
width:90%;
padding:12px;
border-radius:12px;
border:none;
margin:10px;
outline:none;
background:var(--card);
color:var(--text);
}

.container{padding:15px;}

.card{
background:var(--card);
backdrop-filter:blur(18px);
border-radius:22px;
padding:15px;
margin:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
transition:0.25s;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.card:hover{transform:scale(1.04);}

.star{
color:gold;
font-size:18px;
cursor:pointer;
}

button{
background:var(--btn);
border:none;
padding:10px 15px;
border-radius:12px;
color:white;
cursor:pointer;
margin:10px;
}

.hidden{display:none;}

.toggle{
position:fixed;
top:10px;
right:10px;
z-index:999;
display:flex;
gap:10px;
}
</style>
</head>

<body>

<div class="toggle">
<button onclick="toggleMode()">🌗</button>
<button onclick="toggleLang()">🌐</button>
</div>

<h1 id="title">⚽ Football TV Pro</h1>

<div class="container">

<div id="home">

<input id="searchBox" type="text" placeholder="🔎 ابحث عن نادي..." onkeyup="searchClub(this.value)">

<div class="card" onclick="openCountry('dz')">🇩🇿 الجزائر</div>
<div class="card" onclick="openCountry('es')">🇪🇸 إسبانيا</div>
<div class="card" onclick="openCountry('en')">🇬🇧 إنجلترا</div>
<div class="card" onclick="openCountry('fr')">🇫🇷 فرنسا</div>
<div class="card" onclick="openCountry('it')">🇮🇹 إيطاليا</div>
<div class="card" onclick="openCountry('de')">🇩🇪 ألمانيا</div>
<div class="card" onclick="openCountry('pt')">🇵🇹 البرتغال</div>
<div class="card" onclick="openCountry('nl')">🇳🇱 هولندا</div>
<div class="card" onclick="openCountry('sa')">🇸🇦 السعودية</div>

</div>

<div id="country" class="hidden">
<button onclick="backHome()" id="back1">⬅ رجوع</button>
<h2 id="countryTitle"></h2>
<div id="clubsList"></div>
</div>

<div id="clubPage" class="hidden">
<button onclick="backCountry()" id="back2">⬅ رجوع</button>
<h2 id="clubName"></h2>

<div class="card">
<a id="ytLink" target="_blank">📺 القناة الرسمية</a>
</div>
</div>

</div>

<script>

let currentCountry="";
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let lang = localStorage.getItem("lang") || "ar";

/* 🌍 DATA */
const data={
dz:{
nameAr:"🇩🇿 الجزائر",
nameEn:"🇩🇿 Algeria",
clubs:{
"MC Alger":"https://www.youtube.com/@MouloudiaClubAlger",
"JS Kabylie":"https://www.youtube.com/@JSKabylieOfficiel",
"CR Belouizdad":"https://www.youtube.com/@CRBelouizdadOfficiel",
"ES Setif":"https://www.youtube.com/@EntenteSetifOfficiel"
}
},
es:{
nameAr:"🇪🇸 إسبانيا",
nameEn:"🇪🇸 Spain",
clubs:{
"Barcelona":"https://www.youtube.com/@FCBarcelona",
"Real Madrid":"https://www.youtube.com/@realmadrid",
"Atletico Madrid":"https://www.youtube.com/@atleticodemadrid"
}
},
en:{
nameAr:"🇬🇧 إنجلترا",
nameEn:"🇬🇧 England",
clubs:{
"Liverpool":"https://www.youtube.com/@liverpoolfc",
"Chelsea":"https://www.youtube.com/@chelseafc",
"Arsenal":"https://www.youtube.com/@arsenal",
"Manchester City":"https://www.youtube.com/@mancity",
"Manchester United":"https://www.youtube.com/@manutd"
}
},
fr:{
nameAr:"🇫🇷 فرنسا",
nameEn:"🇫🇷 France",
clubs:{
"PSG":"https://www.youtube.com/@psg",
"Marseille":"https://www.youtube.com/@olympiquedemarseille"
}
},
it:{
nameAr:"🇮🇹 إيطاليا",
nameEn:"🇮🇹 Italy",
clubs:{
"Juventus":"https://www.youtube.com/@juventus",
"AC Milan":"https://www.youtube.com/@acmilan",
"Inter":"https://www.youtube.com/@inter"
}
},
de:{
nameAr:"🇩🇪 ألمانيا",
nameEn:"🇩🇪 Germany",
clubs:{
"Bayern Munich":"https://www.youtube.com/@fcbayern",
"Dortmund":"https://www.youtube.com/@bvb"
}
},
pt:{
nameAr:"🇵🇹 البرتغال",
nameEn:"🇵🇹 Portugal",
clubs:{
"Benfica":"https://www.youtube.com/@slbenfica",
"Porto":"https://www.youtube.com/@fcp"
}
},
nl:{
nameAr:"🇳🇱 هولندا",
nameEn:"🇳🇱 Netherlands",
clubs:{
"Ajax":"https://www.youtube.com/@afcajax"
}
},
sa:{
nameAr:"🇸🇦 السعودية",
nameEn:"🇸🇦 Saudi Arabia",
clubs:{
"Al Hilal":"https://www.youtube.com/@alhilal",
"Al Nassr":"https://www.youtube.com/@alnassr"
}
}
};

/* 🌗 */
function toggleMode(){
document.body.classList.toggle("light");
}

/* 🌐 LANGUAGE */
function toggleLang(){
lang = (lang === "ar") ? "en" : "ar";
localStorage.setItem("lang", lang);
applyLang();
}

function applyLang(){
document.documentElement.lang = lang;

document.getElementById("title").innerText =
lang === "ar" ? "⚽ كرة القدم TV برو" : "⚽ Football TV Pro";

document.getElementById("searchBox").placeholder =
lang === "ar" ? "🔎 ابحث عن نادي..." : "🔎 Search club...";

document.getElementById("back1").innerText =
lang === "ar" ? "⬅ رجوع" : "⬅ Back";

document.getElementById("back2").innerText =
lang === "ar" ? "⬅ رجوع" : "⬅ Back";

document.querySelector("#clubPage a").innerText =
lang === "ar" ? "📺 القناة الرسمية" : "📺 Official channel";

if(currentCountry) openCountry(currentCountry);
}

/* NAV */
function openCountry(c){
currentCountry=c;
home.style.display="none";
country.style.display="block";

countryTitle.innerText =
lang === "ar" ? data[c].nameAr : data[c].nameEn;

clubsList.innerHTML="";

for(let club in data[c].clubs){
let div=document.createElement("div");
div.className="card";

let star = favorites.includes(club) ? "⭐" : "☆";

div.innerHTML=`${club} <span class="star">${star}</span>`;

div.onclick=()=>openClub(club);

div.querySelector(".star").onclick=(e)=>{
e.stopPropagation();
toggleFav(club);
};

clubsList.appendChild(div);
}
}

function openClub(name){
clubPage.style.display="block";
country.style.display="none";

clubName.innerText=name;
ytLink.href=data[currentCountry].clubs[name];
}

function backHome(){
country.style.display="none";
home.style.display="block";
}

function backCountry(){
clubPage.style.display="none";
country.style.display="block";
}

/* ⭐ */
function toggleFav(club){
if(favorites.includes(club)){
favorites=favorites.filter(c=>c!==club);
}else{
favorites.push(club);
}
localStorage.setItem("fav",JSON.stringify(favorites));
openCountry(currentCountry);
}

/* 🔎 */
function searchClub(val){
val=val.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "flex":"none";
});
}

/* INIT */
applyLang();

</script>

</body>
</html>
